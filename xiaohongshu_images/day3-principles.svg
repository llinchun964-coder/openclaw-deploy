<svg width="1080" height="1920" xmlns="http://www.w3.org/2000/svg"><rect width="1080" height="1920" fill="#1a365d"/><text x="540" y="110" font-size="48" fill="#d4af37" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">🏢 公司取名 5 大原则</text><rect x="60" y="170" width="960" height="130" rx="20" fill="#ffffff"/><text x="90" y="230" font-size="36" fill="#1a365d" text-anchor="start" font-family="Arial, sans-serif" font-weight="bold">1️⃣ 易记易传播</text><text x="90" y="270" font-size="26" fill="#888888" text-anchor="start" font-family="Arial, sans-serif" font-weight="normal">2-4 个字最佳，发音响亮</text><rect x="60" y="325" width="960" height="130" rx="20" fill="#ffffff"/><text x="90" y="385" font-size="36" fill="#1a365d" text-anchor="start" font-family="Arial, sans-serif" font-weight="bold">2️⃣ 行业属性清晰</text><text x="90" y="425" font-size="26" fill="#888888" text-anchor="start" font-family="Arial, sans-serif" font-weight="normal">科技用云/智，餐饮用味/香</text><rect x="60" y="480" width="960" height="130" rx="20" fill="#ffffff"/><text x="90" y="540" font-size="36" fill="#1a365d" text-anchor="start" font-family="Arial, sans-serif" font-weight="bold">3️⃣ 可注册商标</text><text x="90" y="580" font-size="26" fill="#888888" text-anchor="start" font-family="Arial, sans-serif" font-weight="normal">先查商标，有显著性</text><rect x="60" y="635" width="960" height="130" rx="20" fill="#ffffff"/><text x="90" y="695" font-size="36" fill="#1a365d" text-anchor="start" font-family="Arial, sans-serif" font-weight="bold">4️⃣ 寓意吉祥</text><text x="90" y="735" font-size="26" fill="#888888" text-anchor="start" font-family="Arial, sans-serif" font-weight="normal">符合传统文化，无负面联想</text><rect x="60" y="790" width="960" height="130" rx="20" fill="#ffffff"/><text x="90" y="850" font-size="36" fill="#1a365d" text-anchor="start" font-family="Arial, sans-serif" font-weight="bold">5️⃣ 预留发展空间</text><text x="90" y="890" font-size="26" fill="#888888" text-anchor="start" font-family="Arial, sans-serif" font-weight="normal">不限地域，不限业务</text></svg>