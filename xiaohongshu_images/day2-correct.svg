<svg width="1080" height="1920" xmlns="http://www.w3.org/2000/svg"><rect width="1080" height="1920" fill="#ff8c42"/><text x="540" y="120" font-size="48" fill="#ffffff" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">✅ 正确取名思路</text><rect x="70" y="180" width="940" height="130" rx="20" fill="#ffffff"/><text x="100" y="240" font-size="36" fill="#1a365d" text-anchor="start" font-family="Arial, sans-serif" font-weight="bold">1️⃣ 音律优先</text><text x="100" y="280" font-size="26" fill="#888888" text-anchor="start" font-family="Arial, sans-serif" font-weight="normal">读起来顺口，声调有起伏</text><rect x="70" y="335" width="940" height="130" rx="20" fill="#ffffff"/><text x="100" y="395" font-size="36" fill="#1a365d" text-anchor="start" font-family="Arial, sans-serif" font-weight="bold">2️⃣ 字形美观</text><text x="100" y="435" font-size="26" fill="#888888" text-anchor="start" font-family="Arial, sans-serif" font-weight="normal">写出来好看，结构平衡</text><rect x="70" y="490" width="940" height="130" rx="20" fill="#ffffff"/><text x="100" y="550" font-size="36" fill="#1a365d" text-anchor="start" font-family="Arial, sans-serif" font-weight="bold">3️⃣ 寓意积极</text><text x="100" y="590" font-size="26" fill="#888888" text-anchor="start" font-family="Arial, sans-serif" font-weight="normal">有文化内涵，但不沉重</text><rect x="70" y="645" width="940" height="130" rx="20" fill="#ffffff"/><text x="100" y="705" font-size="36" fill="#1a365d" text-anchor="start" font-family="Arial, sans-serif" font-weight="bold">4️⃣ 独特适中</text><text x="100" y="745" font-size="26" fill="#888888" text-anchor="start" font-family="Arial, sans-serif" font-weight="normal">不太俗也不太怪</text><rect x="70" y="800" width="940" height="130" rx="20" fill="#ffffff"/><text x="100" y="860" font-size="36" fill="#1a365d" text-anchor="start" font-family="Arial, sans-serif" font-weight="bold">5️⃣ 成长友好</text><text x="100" y="900" font-size="26" fill="#888888" text-anchor="start" font-family="Arial, sans-serif" font-weight="normal">小时候可爱，长大也得体</text></svg>